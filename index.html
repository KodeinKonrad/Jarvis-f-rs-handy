<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000814">
<title>J.A.R.V.I.S.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00e5ff;
    --cyan-soft: rgba(0, 229, 255, 0.6);
    --cyan-faint: rgba(0, 229, 255, 0.15);
    --amber: #ffb340;
    --amber-soft: rgba(255, 179, 64, 0.7);
    --red: #ff3344;
    --green: #2bff7a;
    --bg-deep: #000814;
    --bg-mid: #001428;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: radial-gradient(ellipse at center, var(--bg-mid) 0%, var(--bg-deep) 70%, #000 100%);
    color: var(--cyan);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

body::before {
content: ‘’;
position: fixed; inset: 0;
background-image:
linear-gradient(rgba(0, 229, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 229, 255, 0.04) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
-webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

body::after {
content: ‘’;
position: fixed; inset: 0;
background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,229,255,0.025) 3px, transparent 4px);
pointer-events: none;
animation: scanFlicker 4s steps(1) infinite;
}
@keyframes scanFlicker { 50% { opacity: 0.5; } }

.corner {
position: fixed; width: 38px; height: 38px;
border-color: var(–cyan); border-style: solid; border-width: 0;
filter: drop-shadow(0 0 6px var(–cyan-soft));
}
.corner.tl { top: 14px; left: 14px; border-top-width: 2px; border-left-width: 2px; }
.corner.tr { top: 14px; right: 14px; border-top-width: 2px; border-right-width: 2px; }
.corner.bl { bottom: 14px; left: 14px; border-bottom-width: 2px; border-left-width: 2px; }
.corner.br { bottom: 14px; right: 14px; border-bottom-width: 2px; border-right-width: 2px; }

.topbar {
position: fixed; top: 22px; left: 60px; right: 60px;
display: flex; justify-content: space-between;
font-family: ‘Orbitron’, sans-serif;
font-size: 0.7rem; letter-spacing: 0.25em;
color: var(–cyan-soft);
text-transform: uppercase;
}
.topbar .dot {
display: inline-block; width: 6px; height: 6px; border-radius: 50%;
background: var(–cyan); margin-right: 6px;
box-shadow: 0 0 8px var(–cyan); animation: blink 1.4s infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }

.startScreen {
text-align: center;
padding: 0 30px;
animation: fadeIn 0.6s ease-out;
}
.startScreen h1 {
font-family: ‘Orbitron’, sans-serif;
font-size: clamp(2.5rem, 11vw, 4.5rem);
font-weight: 900;
letter-spacing: 0.15em;
margin-bottom: 0.2em;
background: linear-gradient(180deg, #fff 0%, var(–cyan) 100%);
-webkit-background-clip: text;
background-clip: text;
-webkit-text-fill-color: transparent;
filter: drop-shadow(0 0 20px var(–cyan-soft));
}
.startScreen .sub {
font-size: 0.95rem;
letter-spacing: 0.35em;
color: var(–cyan-soft);
margin-bottom: 3em;
text-transform: uppercase;
}
#startBtn {
background: linear-gradient(180deg, transparent 0%, var(–cyan-faint) 100%);
border: 1px solid var(–cyan);
color: var(–cyan);
padding: 1.1em 3em;
font-family: ‘Orbitron’, sans-serif;
font-size: 0.95rem; font-weight: 500;
letter-spacing: 0.4em;
text-transform: uppercase;
cursor: pointer;
border-radius: 2px;
box-shadow: 0 0 30px rgba(0, 229, 255, 0.4), inset 0 0 30px rgba(0, 229, 255, 0.1);
transition: all 0.2s;
position: relative;
}
#startBtn:active { transform: scale(0.97); background: var(–cyan-faint); }
#startBtn::before, #startBtn::after {
content: ‘’; position: absolute; width: 8px; height: 8px;
border: 1px solid var(–cyan);
}
#startBtn::before { top: -4px; left: -4px; border-right: 0; border-bottom: 0; }
#startBtn::after { bottom: -4px; right: -4px; border-left: 0; border-top: 0; }

.hud {
position: relative;
width: 92vmin; height: 92vmin;
display: flex; align-items: center; justify-content: center;
animation: hudIn 1s cubic-bezier(0.2, 0.9, 0.3, 1.2);
}
@keyframes hudIn {
from { opacity: 0; transform: scale(0.85); }
to { opacity: 1; transform: scale(1); }
}

.ring { position: absolute; border-radius: 50%; pointer-events: none; }
.ring-1 {
width: 100%; height: 100%;
border: 1px dashed rgba(0, 229, 255, 0.35);
animation: rotate 32s linear infinite;
}
.ring-2 {
width: 82%; height: 82%;
border: 1px solid rgba(0, 229, 255, 0.5);
animation: rotate 22s linear infinite reverse;
box-shadow: 0 0 40px rgba(0, 229, 255, 0.15), inset 0 0 40px rgba(0, 229, 255, 0.08);
}
.ring-2::before, .ring-2::after {
content: ‘’; position: absolute; width: 14px; height: 14px;
border: 2px solid var(–cyan); border-radius: 50%;
background: var(–bg-deep);
box-shadow: 0 0 10px var(–cyan);
}
.ring-2::before { top: -8px; left: 50%; transform: translateX(-50%); }
.ring-2::after { bottom: -8px; left: 50%; transform: translateX(-50%); }
.ring-3 {
width: 64%; height: 64%;
border: 1px solid rgba(0, 229, 255, 0.25);
border-top-color: var(–cyan);
border-right-color: var(–cyan);
animation: rotate 14s linear infinite;
}
.ring-4 {
width: 48%; height: 48%;
border: 1px dotted rgba(0, 229, 255, 0.5);
animation: rotate 9s linear infinite reverse;
}
@keyframes rotate { to { transform: rotate(360deg); } }

.ticks {
position: absolute; width: 88%; height: 88%; border-radius: 50%;
background:
conic-gradient(from 0deg,
var(–cyan) 0deg, var(–cyan) 0.4deg, transparent 0.4deg, transparent 30deg,
var(–cyan) 30deg, var(–cyan) 30.4deg, transparent 30.4deg, transparent 60deg,
var(–cyan) 60deg, var(–cyan) 60.4deg, transparent 60.4deg, transparent 90deg,
var(–cyan) 90deg, var(–cyan) 90.4deg, transparent 90.4deg, transparent 120deg,
var(–cyan) 120deg, var(–cyan) 120.4deg, transparent 120.4deg, transparent 150deg,
var(–cyan) 150deg, var(–cyan) 150.4deg, transparent 150.4deg, transparent 180deg,
var(–cyan) 180deg, var(–cyan) 180.4deg, transparent 180.4deg, transparent 210deg,
var(–cyan) 210deg, var(–cyan) 210.4deg, transparent 210.4deg, transparent 240deg,
var(–cyan) 240deg, var(–cyan) 240.4deg, transparent 240.4deg, transparent 270deg,
var(–cyan) 270deg, var(–cyan) 270.4deg, transparent 270.4deg, transparent 300deg,
var(–cyan) 300deg, var(–cyan) 300.4deg, transparent 300.4deg, transparent 330deg,
var(–cyan) 330deg, var(–cyan) 330.4deg, transparent 330.4deg, transparent 360deg
);
-webkit-mask: radial-gradient(circle, transparent 49%, black 49%, black 50%, transparent 50%);
mask: radial-gradient(circle, transparent 49%, black 49%, black 50%, transparent 50%);
opacity: 0.7;
}

/* Core – wechselt Farbe je nach State */
.core {
width: 32%; height: 32%; border-radius: 50%;
background:
radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4) 0%, transparent 35%),
radial-gradient(circle, var(–cyan) 0%, rgba(0,180,220,0.5) 40%, transparent 75%);
box-shadow: 0 0 60px rgba(0, 229, 255, 0.7), inset 0 0 30px rgba(255,255,255,0.3);
transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
animation: corePulse 2.4s ease-in-out infinite;
position: relative;
}
.core::after {
content: ‘’; position: absolute; inset: 18%;
border-radius: 50%;
background: radial-gradient(circle, #fff 0%, var(–cyan) 60%, transparent 100%);
filter: blur(2px);
opacity: 0.9;
}
@keyframes corePulse {
0%, 100% { transform: scale(1); filter: brightness(1); }
50% { transform: scale(1.06); filter: brightness(1.2); }
}

/* HÖRMODUS – amber, schnellerer Puls */
.core.listening {
background:
radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5) 0%, transparent 40%),
radial-gradient(circle, var(–amber) 0%, rgba(255,140,0,0.5) 45%, transparent 80%);
box-shadow: 0 0 80px var(–amber-soft), inset 0 0 35px rgba(255,255,255,0.35);
animation: coreListen 0.9s ease-in-out infinite;
}
@keyframes coreListen {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.12); }
}

/* AKTIV – rot */
.core.active {
background:
radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5) 0%, transparent 40%),
radial-gradient(circle, var(–red) 0%, rgba(180,0,30,0.6) 45%, transparent 80%);
box-shadow: 0 0 100px var(–red), inset 0 0 40px rgba(255,255,255,0.4);
animation: coreActive 0.5s ease-in-out infinite;
}
@keyframes coreActive {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.18); }
}

/* ERKANNT – kurzer grüner Flash */
.core.confirmed {
background:
radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6) 0%, transparent 40%),
radial-gradient(circle, var(–green) 0%, rgba(0,180,80,0.6) 45%, transparent 80%);
box-shadow: 0 0 100px var(–green), inset 0 0 40px rgba(255,255,255,0.4);
}

.status {
position: absolute; top: -2%;
left: 50%; transform: translateX(-50%);
font-family: ‘Orbitron’, sans-serif;
font-size: 0.78rem; letter-spacing: 0.3em;
text-transform: uppercase;
text-shadow: 0 0 12px var(–cyan);
white-space: nowrap;
transition: color 0.3s;
}
.status.listening { color: var(–amber); text-shadow: 0 0 12px var(–amber); }
.status.alert     { color: var(–red);   text-shadow: 0 0 12px var(–red); }
.status.ok        { color: var(–green); text-shadow: 0 0 12px var(–green); }

.meter {
position: absolute; bottom: 8%;
left: 50%; transform: translateX(-50%);
display: flex; gap: 4px; align-items: center;
height: 32px;
}
.bar {
width: 3px; height: 4px;
background: var(–cyan);
box-shadow: 0 0 8px var(–cyan);
transition: height 0.05s linear;
border-radius: 1px;
}

.response {
position: fixed; bottom: 14%;
left: 8%; right: 8%;
text-align: center;
font-size: 1.15rem; font-weight: 400;
line-height: 1.5;
min-height: 3em;
text-shadow: 0 0 10px var(–cyan-soft);
opacity: 0;
transition: opacity 0.4s;
letter-spacing: 0.04em;
}
.response.show { opacity: 1; }

.pips {
position: absolute; top: 12%;
left: 50%; transform: translateX(-50%);
display: flex; gap: 14px;
}
.pip {
width: 10px; height: 10px;
border: 1.5px solid var(–cyan);
border-radius: 50%;
transition: all 0.2s;
}
.pip.lit {
background: var(–cyan);
box-shadow: 0 0 14px var(–cyan);
transform: scale(1.3);
}

.hidden { display: none !important; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="startScreen" id="startScreen">
  <h1>J.A.R.V.I.S.</h1>
  <div class="sub">// Just A Rather Very Intelligent System</div>
  <button id="startBtn">▷ Initialisieren</button>
</div>

<div class="hud hidden" id="hud">
  <div class="topbar">
    <span><span class="dot"></span>SYS ONLINE</span>
    <span id="clock">--:--</span>
  </div>

  <div class="ring ring-1"></div>
  <div class="ticks"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>

  <div class="core" id="core"></div>

  <div class="status" id="status">2× KLATSCHEN ZUM AKTIVIEREN</div>

  <div class="pips" id="pips">
    <div class="pip" id="pip1"></div>
    <div class="pip" id="pip2"></div>
  </div>

  <div class="meter" id="meter"></div>
</div>

<div class="response" id="response"></div>

<script>
// ============ ELEMENTE ============
const meterEl = document.getElementById('meter');
for (let i = 0; i < 24; i++) { const b = document.createElement('div'); b.className = 'bar'; meterEl.appendChild(b); }
const bars = meterEl.querySelectorAll('.bar');

const startScreen = document.getElementById('startScreen');
const startBtn    = document.getElementById('startBtn');
const hud         = document.getElementById('hud');
const core        = document.getElementById('core');
const statusEl    = document.getElementById('status');
const responseEl  = document.getElementById('response');
const clockEl     = document.getElementById('clock');
const pip1        = document.getElementById('pip1');
const pip2        = document.getElementById('pip2');

// ============ INHALTE (gerne erweitern!) ============
const STATUS_REPORTS = [
  "Sarkasmus-Modul auf siebenundachtzig Prozent. Voll einsatzbereit.",
  "Kaffeevorrat kritisch. Espressomaschine empfiehlt sofortigen Einsatz.",
  "Anzug Mark XLIV bei vierundneunzig Prozent. Bereit zum Anlegen.",
  "Drei Drohnen aufgewärmt. Eine davon hat schlechte Laune.",
  "Heute keine Weltrettungstermine im Kalender. Sie haben den Tag frei.",
  "Nanobots haben über Nacht Ihr Hemd gebügelt. Gerne geschehen.",
  "Ich habe Ihre WLAN-Passwörter gegen die der Nachbarn getauscht. Ein kleiner Scherz.",
  "Die Welt dreht sich weiter mit ungefähr 1670 Kilometern pro Stunde. Wie immer.",
  "Sicherheitssysteme grün. Alle Türen verschlossen. Alle Bösewichte unbekannt.",
  "Ich habe Ihren Spiegel kalibriert. Sie sehen heute distinguiert aus."
];

const RECOMMENDATIONS = [
  "Trinken Sie heute mindestens zwei Liter Wasser. Ihre Mitochondrien werden es Ihnen danken.",
  "Tun Sie heute eine mutige Sache. Oder zwei. Drei wären übertrieben.",
  "Lächeln Sie heute jemanden grundlos an. Es verwirrt die Menschen herrlich.",
  "Ein zwanzigminütiger Spaziergang würde Ihnen guttun. Auch wenn Sie das jetzt nicht hören wollen.",
  "Erledigen Sie zuerst die unangenehmste Aufgabe. Der Rest fühlt sich dann wie Urlaub an.",
  "Sagen Sie heute jemandem etwas Nettes. Und meinen Sie es auch so.",
  "Vermeiden Sie heute Diskussionen mit Algorithmen. Sie können nicht gewinnen.",
  "Atmen Sie tief durch. Dreimal. Jetzt sofort. Ich warte."
];

const CONFIRMATIONS = [
  "Ich habe Sie verstanden, Sir.",
  "Selbstverständlich, Sir.",
  "Sehr wohl, Sir.",
  "Wie Sie wünschen, Sir."
];

// ============ STATE MACHINE ============
const STATE = { IDLE: 'idle', LISTENING: 'listening', RESPONDING: 'responding' };
let state = STATE.IDLE;

// ============ AUDIO ============
let audioCtx, analyser, timeData, freqData, micStream;
let lastClapTime = 0;
let clapTimestamps = [];

const PEAK_THRESHOLD    = 0.32;
const HF_RATIO_MIN      = 0.45;
const COOLDOWN_MS       = 180;
const MAX_CLAP_INTERVAL = 1100;
const LISTEN_TIMEOUT_MS = 6000;

// ============ UHR ============
function pad(n) { return String(n).padStart(2, '0'); }
function updateClock() {
  const d = new Date();
  clockEl.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}
setInterval(updateClock, 1000); updateClock();

// ============ START ============
startBtn.addEventListener('click', async () => {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });

    const source = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.0;
    source.connect(analyser);

    timeData = new Uint8Array(analyser.fftSize);
    freqData = new Uint8Array(analyser.frequencyBinCount);

    startScreen.classList.add('hidden');
    hud.classList.remove('hidden');

    setTimeout(() => speak("System aktiviert. Bereit für Ihren Befehl, Sir."), 400);
    detectLoop();
  } catch (err) {
    alert('Mikrofon-Zugriff erforderlich.\n\n' + err.message);
  }
});

// ============ KLATSCH-ERKENNUNG ============
function detectLoop() {
  if (!analyser) return;
  analyser.getByteTimeDomainData(timeData);
  analyser.getByteFrequencyData(freqData);

  let peak = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = Math.abs(timeData[i] - 128) / 128;
    if (v > peak) peak = v;
  }

  for (let i = 0; i < bars.length; i++) {
    const idx = Math.floor(i * freqData.length / bars.length);
    const h = Math.max(3, (freqData[idx] / 255) * 32);
    bars[i].style.height = h + 'px';
  }

  // Klatscher nur im IDLE-State erkennen
  if (state === STATE.IDLE) {
    const half = freqData.length / 2;
    let lowSum = 0, highSum = 0;
    for (let i = 0; i < freqData.length; i++) {
      if (i < half) lowSum += freqData[i]; else highSum += freqData[i];
    }
    const hfRatio = highSum / (lowSum + highSum + 1);

    if (peak > PEAK_THRESHOLD && hfRatio > HF_RATIO_MIN) {
      const now = performance.now();
      if (now - lastClapTime > COOLDOWN_MS) {
        lastClapTime = now;
        registerClap(now);
      }
    }
  }

  requestAnimationFrame(detectLoop);
}

function registerClap(now) {
  clapTimestamps.push(now);
  clapTimestamps = clapTimestamps.filter(t => now - t < MAX_CLAP_INTERVAL);
  pip1.classList.toggle('lit', clapTimestamps.length >= 1);
  pip2.classList.toggle('lit', clapTimestamps.length >= 2);

  if (clapTimestamps.length >= 2) {
    clapTimestamps = [];
    enterListeningMode();
  } else {
    setTimeout(() => {
      if (clapTimestamps.length === 1 && performance.now() - clapTimestamps[0] >= MAX_CLAP_INTERVAL) {
        clapTimestamps = [];
        pip1.classList.remove('lit');
      }
    }, MAX_CLAP_INTERVAL + 50);
  }
}

// ============ HÖRMODUS ============
let recognition = null;
let listenTimeout = null;

function enterListeningMode() {
  if (state !== STATE.IDLE) return;
  state = STATE.LISTENING;

  core.classList.add('listening');
  statusEl.classList.add('listening');
  statusEl.textContent = '◉ JARVIS HÖRT...';
  responseEl.textContent = 'Sprich jetzt. Ich höre.';
  responseEl.classList.add('show');

  // Kleines akustisches Signal
  beep(880, 0.08, 0.1);

  startRecognition();
}

function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showError('Spracherkennung in diesem Browser nicht verfügbar.');
    return;
  }

  recognition = new SR();
  recognition.lang = 'de-DE';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;

  let resolved = false;

  recognition.onresult = (event) => {
    if (resolved) return;
    const alts = event.results[0];
    for (let i = 0; i < alts.length; i++) {
      const t = alts[i].transcript.toLowerCase();
      if (matchWakePhrase(t)) {
        resolved = true;
        clearTimeout(listenTimeout);
        try { recognition.stop(); } catch {}
        confirmAndAwaken();
        return;
      }
    }
    // Erkannt, aber falscher Satz
    resolved = true;
    clearTimeout(listenTimeout);
    showError('Befehl nicht erkannt.');
  };

  recognition.onerror = (event) => {
    if (resolved) return;
    resolved = true;
    clearTimeout(listenTimeout);
    if (event.error === 'no-speech')      showError('Kein Sprachsignal.');
    else if (event.error === 'not-allowed') showError('Mikro-Zugriff verweigert.');
    else                                    showError('Fehler: ' + event.error);
  };

  recognition.onend = () => {
    if (resolved) return;
    resolved = true;
    clearTimeout(listenTimeout);
    showError('Keine Antwort empfangen.');
  };

  try { recognition.start(); }
  catch (e) { showError('Recognition-Start fehlgeschlagen.'); }

  listenTimeout = setTimeout(() => {
    if (!resolved) {
      try { recognition.stop(); } catch {}
    }
  }, LISTEN_TIMEOUT_MS);
}

function matchWakePhrase(text) {
  const t = text.toLowerCase().replace(/[^\wäöüß ]/g, '').trim();
  // tolerant: "aufwachen" + entweder "papa" oder "zuhause"
  return t.includes('aufwachen') && (t.includes('papa') || t.includes('zuhause'));
}

function showError(msg) {
  state = STATE.IDLE;
  core.classList.remove('listening');
  statusEl.classList.remove('listening');
  statusEl.textContent = '✕ ' + msg.toUpperCase();
  responseEl.textContent = msg;
  beep(220, 0.15, 0.08);
  setTimeout(() => {
    statusEl.textContent = '2× KLATSCHEN ZUM AKTIVIEREN';
    responseEl.classList.remove('show');
  }, 2200);
}

function confirmAndAwaken() {
  // Grüner Bestätigungs-Flash
  core.classList.remove('listening');
  core.classList.add('confirmed');
  statusEl.classList.remove('listening');
  statusEl.classList.add('ok');
  statusEl.textContent = '✓ ERKANNT';
  beep(1320, 0.1, 0.12);

  setTimeout(() => {
    core.classList.remove('confirmed');
    statusEl.classList.remove('ok');
    runJarvisBriefing();
  }, 700);
}

// ============ JARVIS BRIEFING ============
async function runJarvisBriefing() {
  state = STATE.RESPONDING;
  core.classList.add('active');
  statusEl.classList.add('alert');
  statusEl.textContent = '◉ AKTIV';

  const lines = await buildBriefingLines();

  for (const line of lines) {
    showResponseText(line);
    await speakAsync(line);
    await sleep(250);
  }

  // Zurück zu IDLE
  core.classList.remove('active');
  statusEl.classList.remove('alert');
  statusEl.textContent = '2× KLATSCHEN ZUM AKTIVIEREN';
  pip1.classList.remove('lit');
  pip2.classList.remove('lit');
  setTimeout(() => {
    responseEl.classList.remove('show');
    setTimeout(() => { responseEl.textContent = ''; }, 400);
  }, 1500);
  state = STATE.IDLE;
}

async function buildBriefingLines() {
  const d = new Date();
  const greeting = timeBasedGreeting(d);
  const dateStr  = formatDateLong(d);
  const timeStr  = pad(d.getHours()) + ' Uhr ' + pad(d.getMinutes());

  const lines = [
    pickRandom(CONFIRMATIONS) + " Willkommen zurück.",
    `${greeting} Es ist ${timeStr}, am ${dateStr}.`
  ];

  // Wetter optional
  const weather = await fetchWeather();
  if (weather) lines.push(`Aktuelle Außenbedingungen: ${weather}.`);

  // Statusbericht (2 zufällige, ohne Doppler)
  lines.push("Statusbericht:");
  const sList = shuffled(STATUS_REPORTS).slice(0, 2);
  for (const s of sList) lines.push(s);

  // Empfehlung
  lines.push("Mein Vorschlag für heute:");
  lines.push(pickRandom(RECOMMENDATIONS));

  // Schluss
  lines.push("Ich stehe zu Ihrer Verfügung. Bereit für Ihre Befehle.");
  return lines;
}

function timeBasedGreeting(d) {
  const h = d.getHours();
  if (h < 5)  return "Sie sind aber spät dran, Sir.";
  if (h < 11) return "Guten Morgen, Sir.";
  if (h < 17) return "Guten Tag, Sir.";
  if (h < 22) return "Guten Abend, Sir.";
  return "Es ist spät, Sir.";
}

function formatDateLong(d) {
  const wt = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][d.getDay()];
  const mo = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'][d.getMonth()];
  return `${wt}, dem ${d.getDate()}. ${mo}`;
}

async function fetchWeather() {
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 4000);
    // wttr.in liefert Wetter basierend auf IP-Geolocation, kein Key nötig
    const res = await fetch('https://wttr.in/?format=%t+%C&lang=de', { signal: ctrl.signal });
    if (!res.ok) return null;
    const text = (await res.text()).trim();
    if (text.length < 2 || text.length > 80) return null;
    return text.replace(/\+/g, '').trim(); // "+18°C Sonnig" -> "18°C Sonnig"
  } catch { return null; }
}

// ============ HELPERS ============
function showResponseText(text) {
  responseEl.textContent = text;
  responseEl.classList.add('show');
}
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffled(arr)   { return [...arr].sort(() => Math.random() - 0.5); }
function sleep(ms)       { return new Promise(r => setTimeout(r, ms)); }

function beep(freq, dur, vol) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.value = vol;
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.stop(audioCtx.currentTime + dur);
  } catch {}
}

// ============ TTS ============
let cachedVoice = null;
function pickVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  return voices.find(v => v.lang.startsWith('de') && /male|markus|stefan|hans|yannick|conrad/i.test(v.name))
      || voices.find(v => v.lang.startsWith('de'))
      || voices[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { cachedVoice = pickVoice(); };
  cachedVoice = pickVoice();
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.95; u.pitch = 0.85;
  if (!cachedVoice) cachedVoice = pickVoice();
  if (cachedVoice) u.voice = cachedVoice;
  speechSynthesis.speak(u);
}

function speakAsync(text) {
  return new Promise(resolve => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE'; u.rate = 0.95; u.pitch = 0.85;
    if (!cachedVoice) cachedVoice = pickVoice();
    if (cachedVoice) u.voice = cachedVoice;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}
